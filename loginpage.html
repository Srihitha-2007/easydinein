<!DOCTYPE html>
<html>
<head>
  <title>Login - EasyDine</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    .box {
      background: #111;
      padding: 30px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }


    .login-btn {
      background: #ff4500;
      color: white;
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }

    .gmail-btn {
      background:#ff4500;
      color: white;
      font-weight: bold;
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }

    .gmail-btn:hover {
      background: #ddd;
    }

    a {
      color: #ff4500;
    }

    .divider {
      margin: 15px 0;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button class="login-btn" onclick="login()">Login</button>

    <div class="divider">OR</div>

    <button class="gmail-btn" onclick="gmailLogin()">
      Login with Gmail
    </button>

    <p>Don't have an account? <a href="signuppage.html">Signup</a></p>
  </div>

  <script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let storedData = localStorage.getItem("user");

    console.log("Stored:", storedData); // DEBUG

    if(!storedData) {
        alert("No user found. Please signup first.");
        return;
    }

    let userObj = JSON.parse(storedData);

    if(user === userObj.username && pass === userObj.password) {
        alert("Login successful");
        window.location.href = "index.html";
    } else {
        alert("Invalid credentials");
    }
}
</script>
